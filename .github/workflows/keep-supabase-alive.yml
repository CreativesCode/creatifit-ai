name: Keep Supabase Alive

# Supabase free pausa el proyecto tras ~7 dias sin actividad en la BD.
# Llamamos al RPC public.ping() a diario para evitarlo. Daily da margen
# por si GH Actions retrasa una ejecucion bajo carga (comun en free tier).

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/ping" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          status=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')
          echo "Status: $status"
          echo "Body: $body"
          [ "$status" = "200" ]
